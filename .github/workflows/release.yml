name: Release binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir "bisectrunk-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/bisectrunk" README.md LICENSE "bisectrunk-${{ matrix.target }}/"
          tar -czf "bisectrunk-${{ matrix.target }}.tar.gz" "bisectrunk-${{ matrix.target }}"
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory "bisectrunk-${{ matrix.target }}"
          Copy-Item "target/${{ matrix.target }}/release/bisectrunk.exe", README.md, LICENSE "bisectrunk-${{ matrix.target }}/"
          Compress-Archive "bisectrunk-${{ matrix.target }}" "bisectrunk-${{ matrix.target }}.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: bisectrunk-${{ matrix.target }}.${{ matrix.archive }}
