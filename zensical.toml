[project]
site_name = "bisectrunk"
site_description = "Parallel, environment-aware, resumable Git bisection"
site_author = "Nan Xiao"
site_url = "https://nanx.me/bisectrunk/"
repo_url = "https://github.com/nanxstats/bisectrunk"
repo_name = "nanxstats/bisectrunk"
edit_uri = "edit/main/docs/"
copyright = """
Copyright &copy; 2026 bisectrunk authors
"""

nav = [
  { "Home" = "index.md" },
  { "Guide" = [
    "guide/install.md",
    "guide/quickstart.md",
    "guide/cli.md",
    "guide/hooks.md",
    "guide/recipes.md",
    "guide/results.md",
  ] },
  { "Design" = [
    "design/principles.md",
    "design/strategies.md",
    "design/isolation.md",
    "design/protocol.md",
    "design/deps.md",
  ] },
]

extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Section for configuring theme options
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
font = false

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  #"navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  #"navigation.instant.progress",
  "navigation.path",
  #"navigation.prune",
  "navigation.sections",
  #"navigation.tabs",
  #"navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  #"toc.follow",
  #"toc.integrate",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"
